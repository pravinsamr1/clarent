<body>

    <!-- Preloader Start -->
    <div id="preloader" class="preloader">
        <div class="animation-preloader">
            <div class="spinner">
            </div>
            <div class="txt-loading">
                <span data-text-preloader="T" class="letters-loading">
                    T
                </span>
                <span data-text-preloader="E" class="letters-loading">
                    E
                </span>
                <span data-text-preloader="C" class="letters-loading">
                    C
                </span>
                <span data-text-preloader="M" class="letters-loading">
                    M
                </span>
                <span data-text-preloader="O" class="letters-loading">
                    O
                </span>
            </div>
            <p class="text-center">Loading</p>
        </div>
        <div class="loader">
            <div class="row">
                <div class="col-3 loader-section section-left">
                    <div class="bg"></div>
                </div>
                <div class="col-3 loader-section section-left">
                    <div class="bg"></div>
                </div>
                <div class="col-3 loader-section section-right">
                    <div class="bg"></div>
                </div>

                    <div class="bg"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Start Cursor Pointer -->
    <div class="mouse-follower">
        <span class="cursor-outline"></span>
        <span class="cursor-dot"></span>
    </div>
    <!-- End Cursor Pointer -->


  <div id="header"></div>

    <!-- Banner Section Start -->
    <section class="breadcrumb-section position-relative fix">
        <div class="container">
            <div class="bread-content text-center">
                <ul class="d-flex align-items-center gap-3 justify-content-center">
                    <li>
                        <a href="index.html" class="p3-clr">Home</a>
                    </li>
                    <li class="p3-clr">/</li>
                    <li class="white">Contact us</li>
                </ul>
                <h1 class="white visible-from-right">Contact us</h1>
            </div>
        </div>
        <!-- bread Element -->
        <img src="assets/img/element/bread-ele.png" alt="img" class="bread-ele">
    </section>
    <!-- Banner Section Start -->

    <!-- Contact Info Section Start -->
    <section class="contact-info-section fix space-top space-bottom">
        <div class="container">
            <div class="row g-5 align-items-center">
                <!-- Left Column: Image -->
                <div class="col-lg-6 col-md-12">
                    <div class="contact-img-container">
                        <img src="assets/webimages/contact.jpg" alt="Contact Illustration">
                    </div>
                </div>
                <!-- Right Column: Stack of Details Cards -->
                <div class="col-lg-6 col-md-12">
                    <div class="contact-details-wrapper">
                        <!-- Card 1: Phone -->
                        <div class="contact-detail-card phone-card">
                            <div class="contact-icon-box">
                                <i class="fa-solid fa-phone"></i>
                            </div>
                            <div class="contact-detail-info">
                                <h5>Phone Number</h5>
                                <p>Call Us Directly:</p>
                                <a href="tel:+12246767430" class="fw-semibold">+(1) 224 676 7430</a>
                            </div>
                        </div>

                        <!-- Card 2: Email -->
                        <div class="contact-detail-card email-card">
                            <div class="contact-icon-box">
                                <i class="fa-regular fa-envelope"></i>
                            </div>
                            <div class="contact-detail-info">
                                <h5>Email Address</h5>
                                <p>Send Us an Email:</p>
                                <a href="mailto:Tecmo@gmail.com" class="fw-semibold">Tecmo@gmail.com</a>
                            </div>
                        </div>

                        <!-- Card 3: Address -->
                        <div class="contact-detail-card address-card">
                            <div class="contact-icon-box">
                                <i class="fa-solid fa-map-location-dot"></i>
                            </div>
                            <div class="contact-detail-info">
                                <h5>Office Location</h5>
                                <p>Headquarters:</p>
                                <p class="fw-semibold black">Digital Agency Network 20 Eastbourne Terrace, London W2 6LG</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Contact Form & Map Section Start -->
    <section class="contact-form-map-section fix space-bottom">
        <div class="container">
            <div class="row g-5 align-items-stretch">
                <!-- Left Column: Premium Contact Inquiry Form -->
                <div class="col-lg-7">
                    <div class="contact-form-card">
                        <h3>How Can We Help You?</h3>
                        <form action="#" method="POST" id="contact-form">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-input-wrapper">
                                        <input type="text" name="name" id="name" placeholder="Your Name" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-input-wrapper">
                                        <input type="tel" name="phone" id="phone" placeholder="Your Phone Number" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-input-wrapper">
                                        <input type="email" name="email" id="email" placeholder="Your Email Address" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-input-wrapper">
                                        <input type="text" name="subject" id="subject" placeholder="Your Subject" required>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="form-input-wrapper">
                                        <textarea name="message" id="message" rows="5" placeholder="Write Your Message Here..." required></textarea>
                                    </div>
                                </div>
                                <div class="col-12">
                                    <div class="d-flex flex-lg-nowrap flex-wrap justify-content-lg-between justify-content-center align-items-center gap-4 mt-3">
                                        <button type="submit" class="common-btn box-style cmn-style1 d-inline-flex justify-content-center align-items-center gap-xxl-2 gap-2 fs18 fw-semibold white overflow-hidden rounded-5 p3-bg" style="border: none; white-space: nowrap;">
                                            <span>
                                                Send Message
                                                <span class="ani-arrow" style="margin-left: 8px;">
                                                    <i class="fa-solid fa-arrow-right-long"></i>
                                                </span>
                                            </span>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Right Column: Premium Location Map Card -->
                <div class="col-lg-5">
                    <div class="contact-map-card">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d52808140.21705447!2d-161.46429918210544!3d36.11412792251988!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54eab584e432360b%3A0x1c3bb99243deb742!2sUnited%20States!5e0!3m2!1sen!2sbd!4v1740418796595!5m2!1sen!2sbd"
                            style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </section>
