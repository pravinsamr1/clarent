        /* Banner Background & Map Animation */
.banner-bg-slide {
    position: relative;
    overflow: hidden;
    background: 
        radial-gradient(circle at 50% 50%, rgba(10, 16, 44, 0.55) 0%, rgba(3, 6, 17, 0.90) 100%),
        url('assets/webimages/image.png') no-repeat center center/cover !important;
    background-blend-mode: multiply;
    min-height: 700px;
    display: flex;
    align-items: center;
}

/* Dark Overlay for Superior Accessibility and Text Contrast */
.banner-bg-slide::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        180deg,
        rgba(3, 6, 17, 0.82) 0%,
        rgba(10, 16, 44, 0.65) 50%,
        rgba(3, 6, 17, 0.88) 100%
    );
    z-index: 3;
    pointer-events: none;
}

/* Moving Light Sweep Effect */
.banner-bg-slide::after {
    content: "";
    position: absolute;
    top: 0;
    left: -120%;
    width: 60%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(81, 53, 255, 0.15),
        rgba(255, 84, 85, 0.08),
        transparent
    );
    transform: skewX(-25deg);
    animation: lightMove 9s linear infinite;
    z-index: 4;
    pointer-events: none;
}

/* Keep Banner Text and Controls Static and on Top */
.banner-content {
    position: relative;
    z-index: 10;
}

/* Container for Animated Network Map */
.banner-map-container {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
    opacity: 0.25; /* Sleek, subtle premium background layer */
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Map SVG Styling */
.banner-map-svg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* Node connections - static line (faint and mild) */
.map-connection-line {
    fill: none;
    stroke: rgba(255, 255, 255, 0.06);
    stroke-width: 0.8px;
    stroke-linecap: round;
}

/* Node connections - pulsing glowing line (mild opacity) */
.map-connection-line-active {
    fill: none;
    stroke: url(#activeLineGradient);
    stroke-width: 1px;
    stroke-dasharray: 6 18;
    stroke-linecap: round;
    opacity: 0.28;
    animation: dashMove 45s linear infinite;
}

/* World Map Continent Outlines (subtle radar blueprint style) */
.map-continent {
    fill: rgba(81, 53, 255, 0.008);
    stroke: rgba(255, 255, 255, 0.045);
    stroke-width: 0.8px;
    stroke-dasharray: 4 6;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Central Active Beacons (scaled down and mild) */
.map-node {
    fill: #5135ff;
    stroke: rgba(255, 255, 255, 0.85);
    stroke-width: 1px;
    r: 3px;
    filter: drop-shadow(0 0 6px rgba(81, 53, 255, 0.6));
}

.map-node.red-node {
    fill: #ff5455;
    filter: drop-shadow(0 0 6px rgba(255, 84, 85, 0.6));
}

.map-node.cyan-node {
    fill: #00f3ff;
    filter: drop-shadow(0 0 6px rgba(0, 243, 255, 0.6));
}

/* Expanding Radar Beacons */
.map-node-pulse {
    fill: none;
    stroke: #5135ff;
    stroke-width: 1px;
    opacity: 0;
    transform-origin: center;
    animation: pulseGlow 4.5s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
}

.map-node-pulse.pulse-red {
    stroke: #ff5455;
}

.map-node-pulse.pulse-cyan {
    stroke: #00f3ff;
}

/* Elegant Micro-Data Packets (mild and faint) */
.map-packet {
    fill: #ff5455;
    r: 1.8px;
    opacity: 0.65;
    filter: drop-shadow(0 0 4px #ff5455);
}

.map-packet-blue {
    fill: #5135ff;
    r: 1.8px;
    opacity: 0.65;
    filter: drop-shadow(0 0 4px #5135ff);
}

.map-packet-cyan {
    fill: #00f3ff;
    r: 2px;
    opacity: 0.7;
    filter: drop-shadow(0 0 4px #00f3ff);
}

/* Keyframes */
@keyframes dashMove {
    to {
        stroke-dashoffset: -1000px;
    }
}

@keyframes pulseGlow {
    0% {
        r: 2px;
        opacity: 0.9;
    }
    50% {
        opacity: 0.4;
    }
    100% {
        r: 26px;
        opacity: 0;
    }
}

@keyframes lightMove {
    0% {
        left: -120%;
    }
    100% {
        left: 160%;
    }
}
